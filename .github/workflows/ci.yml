name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Instalar dependências
        run: npm install

      - name: Rodar build
        run: npm run build

      - name: Testes unitarios
        run: npm test

      - name: Build imagem Docker (validação)
        run: docker build -t estudemy-backend:ci .

      - name: Instalar semver
        run: npm install -g semver
      - name: Criar nova tag caso não exista
        id: create_initial_tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git tag)" ]; then
            git config --global user.name 'github-actions'
            git config --global user.email 'github-actions@github.com'
            git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
            git tag -a v0.0.0 -m "Initial release"
            git push origin v0.0.0
          fi
            - name: Calcular nova versão
        id: version
        run: |
          git fetch --tags
          # Pega a última tag ou define v0.0.0 se não houver nenhuma
          LAST_TAG=$(git describe --tags $(git rev-list --tags --max-count=1) 2>/dev/null || echo "v0.0.0")
          echo "Versão Atual: $LAST_TAG"

          if [ "$LAST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s")
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s")
          fi
          
          if [ -z "$COMMITS" ]; then
            echo "Nenhum commit novo encontrado. Mantendo versão."
            echo "new_version=${LAST_TAG#v}" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Analisando commits..."
          MAJOR=0
          MINOR=0
          PATCH=0

          # Loop correto para ler linha por linha
          while IFS= read -r line; do
            # Converte para minúsculo para comparação
            commit_msg=$(echo "$line" | tr '[:upper:]' '[:lower:]')
            
            if [[ "$commit_msg" == *"breaking change"* ]]; then
              MAJOR=1
            elif [[ "$commit_msg" == *"feat"* ]]; then
              MINOR=1
            elif [[ "$commit_msg" == *"fix"* ]]; then
              PATCH=1
            fi
          done <<< "$COMMITS"

          # Se houver commits mas nenhum padrão foi detectado, força um PATCH (ex: 1.0.0 -> 1.0.1)
          if [ $MAJOR -eq 0 ] && [ $MINOR -eq 0 ] && [ $PATCH -eq 0 ]; then
            PATCH=1
          fi

          CURRENT_VERSION=${LAST_TAG#v}
          if [ $MAJOR -eq 1 ]; then
            NEW_VERSION=$(semver -i major $CURRENT_VERSION)
          elif [ $MINOR -eq 1 ]; then
            NEW_VERSION=$(semver -i minor $CURRENT_VERSION)
          else
            NEW_VERSION=$(semver -i patch $CURRENT_VERSION)
          fi

          echo "Nova versão calculada: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          
      - name: Atualizar versão no package.json
        run: |
          npm version ${{ steps.version.outputs.new_version }} --no-git-tag-version
          
      - name: Commit e push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git add package.json
          git commit -m "chore(release): version ${{ steps.version.outputs.new_version }}"
          git tag v${{ steps.version.outputs.new_version }}
          git push origin main --tags

      - name: Rodar testes com coverage
        run: npm run test -- --coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=milysj_Back-End-TS
            -Dsonar.organization=milysj
            -Dsonar.sources=src
            -Dsonar.tests=src
            -Dsonar.test.inclusions=**/*.test.ts,**/*.spec.ts
      
      - name: Enviar email em caso de falha
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_ORIGIN }}
          password: ${{ secrets.EMAIL_APP_PASSWORD }}  
          subject: "Falha no CI - Back-End-TS"
          body: "O processo de CI falhou. Por favor, verifique os logs para mais detalhes."
          to: ${{ secrets.EMAIL_DESTINO }}
          from: ${{ secrets.EMAIL_ORIGIN }}   
        
        #  Login Docker Hub
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build + Push Docker
      - name: Build e Push Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/estudemy-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/estudemy-backend:${{ steps.version.outputs.new_version }}